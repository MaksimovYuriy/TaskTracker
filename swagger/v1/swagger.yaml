---
openapi: 3.0.1
info:
  title: Task Tracker API
  version: v1
  description: API трекера задач для МИС
servers:
- url: http://{defaultHost}
  variables:
    defaultHost:
      default: localhost:3000
components:
  schemas:
    Task:
      type: object
      properties:
        data:
          "$ref": "#/components/schemas/TaskResource"
        included:
          type: array
          items:
            "$ref": "#/components/schemas/TagResource"
      required:
      - data
    TaskCollection:
      type: object
      properties:
        data:
          type: array
          items:
            "$ref": "#/components/schemas/TaskResource"
        included:
          type: array
          items:
            "$ref": "#/components/schemas/TagResource"
        meta:
          "$ref": "#/components/schemas/PaginationMeta"
      required:
      - data
      - meta
    TaskBatch:
      type: object
      properties:
        data:
          type: array
          items:
            "$ref": "#/components/schemas/TaskResource"
        included:
          type: array
          items:
            "$ref": "#/components/schemas/TagResource"
      required:
      - data
    TaskResource:
      type: object
      properties:
        id:
          type: string
          example: '1'
        type:
          type: string
          enum:
          - task
        attributes:
          type: object
          properties:
            title:
              type: string
              example: Обход пациентов
            description:
              type: string
              example: Палаты 201–215, проверить капельницы
            status:
              type: string
              enum:
              - pending
              - done
              - cancelled
            scheduled_at:
              type: string
              format: date-time
            user_id:
              type: integer
              nullable: true
              description: Идентификатор владельца задачи (placeholder под будущую
                модель User)
            task_template_id:
              type: string
              nullable: true
              description: ID шаблона, если задача из серии повторений; null для одиночных
          required:
          - title
          - description
          - status
          - scheduled_at
          - user_id
          - task_template_id
        relationships:
          type: object
          properties:
            tags:
              type: object
              properties:
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      type:
                        type: string
                        enum:
                        - tag
                    required:
                    - id
                    - type
      required:
      - id
      - type
      - attributes
    TaskCreateInput:
      type: object
      properties:
        task:
          type: object
          properties:
            title:
              type: string
              example: Утренний обход
            description:
              type: string
              example: Палаты 201–215, проверить капельницы
            status:
              type: string
              enum:
              - pending
              - done
              - cancelled
            scheduled_at:
              type: string
              format: date-time
              description: Игнорируется, если заданы recurrence-поля
            user_id:
              type: integer
              description: Идентификатор владельца задачи. Опциональное; при появлении
                модели User станет обязательным и подставляться будет автоматически
                из current_user
            recurrence_type:
              type: string
              enum:
              - daily
              - monthly
              - specific_dates
              - even_days
              - odd_days
              description: Если задано — создаётся серия повторяющихся задач через
                шаблон
            interval:
              type: integer
              minimum: 1
              description: Каждый N-й день. Обязательно для recurrence_type=daily
            day_of_month:
              type: integer
              minimum: 1
              maximum: 31
              description: День месяца. Обязательно для recurrence_type=monthly
            specific_dates:
              type: array
              items:
                type: string
                format: date
              description: Список дат. Обязательно для recurrence_type=specific_dates
            time_of_day:
              type: string
              example: '09:00'
              description: Время суток в формате HH:MM. Обязательно для всех recurrence-типов
            ends_at:
              type: string
              format: date
              description: Дата окончания серии (опционально)
            tag_ids:
              type: array
              items:
                type: integer
              description: Привязать теги. Для рекуррентных задач — копируются в каждую
                материализованную задачу
          required:
          - title
          - description
      required:
      - task
    TaskUpdateInput:
      type: object
      properties:
        task:
          type: object
          properties:
            title:
              type: string
              example: Обход пациентов
            description:
              type: string
              example: Палаты 201–215, проверить капельницы
            status:
              type: string
              enum:
              - pending
              - done
              - cancelled
            scheduled_at:
              type: string
              format: date-time
      required:
      - task
    Tag:
      type: object
      properties:
        data:
          "$ref": "#/components/schemas/TagResource"
      required:
      - data
    TagCollection:
      type: object
      properties:
        data:
          type: array
          items:
            "$ref": "#/components/schemas/TagResource"
        meta:
          "$ref": "#/components/schemas/PaginationMeta"
      required:
      - data
      - meta
    TagResource:
      type: object
      properties:
        id:
          type: string
          example: '1'
        type:
          type: string
          enum:
          - tag
        attributes:
          type: object
          properties:
            title:
              type: string
              example: звонок
            system:
              type: boolean
              example: true
          required:
          - title
          - system
      required:
      - id
      - type
      - attributes
    TagInput:
      type: object
      properties:
        tag:
          type: object
          properties:
            title:
              type: string
              example: критично
              maxLength: 32
          required:
          - title
      required:
      - tag
    AttachTagInput:
      type: object
      properties:
        tag_id:
          type: integer
          example: 1
      required:
      - tag_id
    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 25
        total_pages:
          type: integer
          example: 4
        total_count:
          type: integer
          example: 87
      required:
      - current_page
      - per_page
      - total_pages
      - total_count
    Error:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              status:
                type: string
                example: '422'
              code:
                type: string
                example: validation_error
              detail:
                type: string
                example: Title can't be blank
              source:
                type: object
                properties:
                  pointer:
                    type: string
                    example: "/data/attributes/title"
            required:
            - status
            - code
            - detail
      required:
      - errors
paths:
  "/api/v1/tags":
    get:
      summary: list tags
      tags:
      - Tags
      parameters:
      - name: page
        in: query
        schema:
          type: integer
        required: false
        description: Page number
      - name: per_page
        in: query
        schema:
          type: integer
        required: false
        description: Items per page (max 100)
      responses:
        '200':
          description: list of tags
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/TagCollection"
    post:
      summary: create tag
      tags:
      - Tags
      parameters: []
      responses:
        '201':
          description: tag created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Tag"
        '400':
          description: parameter missing
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: validation error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/TagInput"
  "/api/v1/tags/{id}":
    parameters:
    - name: id
      in: path
      required: true
      description: Tag ID
      schema:
        type: integer
    get:
      summary: show tag
      tags:
      - Tags
      responses:
        '200':
          description: tag found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Tag"
        '404':
          description: tag not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    patch:
      summary: update tag
      tags:
      - Tags
      parameters: []
      responses:
        '200':
          description: tag updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Tag"
        '400':
          description: parameter missing
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '404':
          description: tag not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: system tag protected
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/TagInput"
    delete:
      summary: destroy tag
      tags:
      - Tags
      responses:
        '204':
          description: tag destroyed
        '404':
          description: tag not found
        '422':
          description: system tag protected
  "/api/v1/tasks/{task_id}/tags":
    parameters:
    - name: task_id
      in: path
      required: true
      description: Task ID
      schema:
        type: integer
    post:
      summary: attach tag to task
      tags:
      - TaskTags
      parameters: []
      responses:
        '200':
          description: tag attached (idempotent)
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Task"
        '400':
          description: parameter missing
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '404':
          description: task or tag not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/AttachTagInput"
  "/api/v1/tasks/{task_id}/tags/{id}":
    parameters:
    - name: task_id
      in: path
      required: true
      description: Task ID
      schema:
        type: integer
    - name: id
      in: path
      required: true
      description: Tag ID
      schema:
        type: integer
    delete:
      summary: detach tag from task
      tags:
      - TaskTags
      responses:
        '204':
          description: tag detached
        '404':
          description: task not found or tag not attached
  "/api/v1/tasks":
    get:
      summary: list tasks
      tags:
      - Tasks
      parameters:
      - name: page
        in: query
        schema:
          type: integer
        required: false
        description: Page number
      - name: per_page
        in: query
        schema:
          type: integer
        required: false
        description: Items per page (max 100)
      - name: q[status_eq]
        in: query
        schema:
          type: string
          enum:
          - pending
          - done
          - cancelled
        required: false
      - name: q[scheduled_at_gteq]
        in: query
        schema:
          type: string
          format: date-time
        required: false
      - name: q[scheduled_at_lteq]
        in: query
        schema:
          type: string
          format: date-time
        required: false
      - name: q[tags_id_in][]
        in: query
        schema:
          type: array
          items:
            type: integer
        required: false
        description: Filter by tag ids (OR semantics)
      - name: q[tags_title_in][]
        in: query
        schema:
          type: array
          items:
            type: string
        required: false
        description: Filter by tag titles (OR semantics)
      responses:
        '200':
          description: list of tasks
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/TaskCollection"
    post:
      summary: create task
      tags:
      - Tasks
      parameters: []
      responses:
        '201':
          description: single task or recurring series created
          content:
            application/json:
              schema:
                oneOf:
                - "$ref": "#/components/schemas/Task"
                - "$ref": "#/components/schemas/TaskBatch"
        '400':
          description: parameter missing
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: validation error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/TaskCreateInput"
  "/api/v1/tasks/{id}":
    parameters:
    - name: id
      in: path
      required: true
      description: Task ID
      schema:
        type: integer
    get:
      summary: show task
      tags:
      - Tasks
      responses:
        '200':
          description: task found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Task"
        '404':
          description: task not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    patch:
      summary: update task
      tags:
      - Tasks
      parameters: []
      responses:
        '200':
          description: task updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Task"
        '400':
          description: parameter missing
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '404':
          description: task not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: validation error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/TaskUpdateInput"
    delete:
      summary: delete task
      tags:
      - Tasks
      responses:
        '204':
          description: task deleted
        '404':
          description: task not found
  "/api/v1/tasks/{id}/recurrence":
    parameters:
    - name: id
      in: path
      required: true
      description: Task ID
      schema:
        type: integer
    delete:
      summary: cancel recurring series
      tags:
      - Tasks
      description: 'Отменяет всю серию повторений: помечает шаблон неактивным и удаляет
        все будущие pending-задачи серии (включая текущую). Идемпотентно — для задачи
        без серии возвращает 204 без изменений.'
      responses:
        '204':
          description: recurrence cancelled (or task not in series — no-op)
        '404':
          description: task not found
